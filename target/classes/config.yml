# ═══════════════════════════════════════════════════════════════
#  Artifacts Configuration
#  All abilities can be toggled, and strength/duration values
#  can be adjusted. Changes apply on /artifacts reload.
# ═══════════════════════════════════════════════════════════════

# DO NOT EDIT THIS
version: "1.1"

# Update Checker
updates:
  check-for-updates: true

items:

  # ─── Item 1: Umbrella ───
  umbrella:
    enabled: true
    # Slow Falling amplifier (0 = level I)
    slow-falling-amplifier: 0

  # ─── Item 2: Everlasting Beef ───
  everlasting_beef:
    enabled: true
    # Cooldown between eats (seconds)
    cooldown-seconds: 15

  # ─── Item 3: Eternal Steak ───
  eternal_steak:
    enabled: true
    # Cooldown between eats (seconds)
    cooldown-seconds: 15
    # Cook time in furnace (seconds)
    furnace-time-seconds: 10
    # Cook time in smoker (seconds)
    smoker-time-seconds: 5
    # Cook time in campfire (seconds)
    campfire-time-seconds: 30

  # ─── Item 4: Snorkel ───
  snorkel:
    enabled: true
    # Oxygen duration when submerged (seconds)
    oxygen-duration-seconds: 15

  # ─── Item 5: Villager Hat ───
  villager_hat:
    enabled: true
    # Hero of the Village level for older versions (1-5)
    hero-of-village-level: 2

  # ─── Item 6: Superstitious Hat ───
  superstitious_hat:
    enabled: true
    # Extra looting levels applied to mob drops
    looting-bonus: 1

  # ─── Item 7: Cowboy Hat ───
  cowboy_hat:
    enabled: true
    # Speed amplifier for mount (0 = Speed I)
    mount-speed-amplifier: 0

  # ─── Item 8: Lucky Scarf ───
  lucky_scarf:
    enabled: true
    # Extra fortune levels for mined blocks
    fortune-bonus: 1

  # ─── Item 9: Cross Necklace ───
  cross_necklace:
    enabled: true
    # Total invulnerability ticks (vanilla default: 10)
    invulnerability-ticks: 30

  # ─── Item 10: Panic Necklace ───
  panic_necklace:
    enabled: true
    # Speed amplifier on damage (0 = Speed I)
    speed-amplifier: 0
    # Speed duration (seconds)
    speed-duration-seconds: 7

  # ─── Item 11: Shock Pendant ───
  shock_pendant:
    enabled: true
    # Chance to summon lightning (0.0 - 1.0)
    lightning-chance: 0.15
    # Whether wearer is immune to lightning damage
    lightning-immunity: true

  # ─── Item 12: Flame Pendant ───
  flame_pendant:
    enabled: true
    # Chance to ignite attacker (0.0 - 1.0)
    fire-chance: 0.30
    # Instant damage dealt to attacker (hearts)
    instant-damage: 2.0
    # Fire duration on attacker (seconds)
    fire-duration-seconds: 4
    # Fire resistance duration for wearer (seconds)
    fire-resistance-duration-seconds: 10

  # ─── Item 13: Plastic Drinking Hat ───
  plastic_drinking_hat:
    enabled: true
    # Eating/drinking speed (ticks, vanilla default: 32)
    eat-speed-ticks: 24

  # ─── Item 14: Novelty Drinking Hat ───
  novelty_drinking_hat:
    enabled: true
    # Eating/drinking speed (ticks, vanilla default: 32)
    eat-speed-ticks: 16

  # ─── Item 15: Night Vision Goggles ───
  night_vision_goggles:
    enabled: true

  # ─── Item 16: Angler's Hat ───
  anglers_hat:
    enabled: true
    # Extra Luck of the Sea levels
    luck-of-the-sea-bonus: 1
    # Extra Lure levels
    lure-bonus: 1

  # ─── Item 17: Scarf of Invisibility ───
  scarf_of_invisibility:
    enabled: true

  # ─── Item 18: Thorn Pendant ───
  thorn_pendant:
    enabled: true
    # Chance to damage attacker (0.0 - 1.0)
    thorn-chance: 0.45
    # Instant damage dealt to attacker (hearts)
    thorn-damage-min: 1
    thorn-damage-max: 4

  # ─── Item 19: Charm of sinking ───
  charm-of-sinking:
    enabled: true  
    
  # ─── Item 20: Cloud in a Bottle ───
  cloud_in_a_bottle:
    enabled: true

  # ─── Item 21: Obsidian Skull ───
  obsidian_skull:
    enabled: true
    # Fire resistance duration (seconds)
    fire-resistance-duration-seconds: 30
    # Cooldown between uses (seconds)
    cooldown-seconds: 60

  # ─── Item 22: Antidote Vessel ───
  antidote_vessel:
    enabled: true
    # Cap negative effect duration
    cap-duration-seconds: 6

  # ─── Item 23: Universal Attractor ───
  universal_attractor:
    enabled: true
    # Radius in blocks to attract items
    radius: 5
    # Cooldown when item is dropped
    cooldown-seconds: 10
  
  # ─── Item 24: Crystal Heart ───
  crystal_heart:
    enabled: true
    # Bonus health (hearts)
    bonus-health: 5

  # ─── Item 25: Helium Flamingo ───
  helium_flamingo:
    enabled: true
    # Cooldown between uses (seconds)
    cooldown-seconds: 15
    # Use seconds
    use-seconds: 15

  # ─── Item 26: Chorus Totem ───
  chorus_totem:
    enabled: true # disabled because it is not working correctly
  
  # ─── Item 27: Digging Claws ───
  digging_claws:
    enabled: true
    # Mining speed amplifier (0 = Haste I)
    speed-amplifier: 3
  
  # ─── Item 28: Feral Claws ───
  feral_claws:
    enabled: true
    # Attack speed amplifier
    attack-speed-amplifier: 0.35

  # ─── Item 29: Power Glove ───
  power_glove:
    enabled: true
    # Attack Damage multiplier
    attack-damage-multiplier: 4

  # ─── Item 30: Fire Gauntlet ───
  fire_gauntlet:
    enabled: true
    # Fire duration on attacker (seconds)
    fire-duration-seconds: 40

  # ─── Item 31: Pocket Piston ───
  pocket_piston:
    enabled: true
    # Knockback amplifier
    knockback-amplifier: 1.5

  # ─── Item 32: Vampiric Glove ───
  vampiric_glove:
    enabled: true
    # Health absorbed per damage (percentage)
    health-absorbed: 0.2

  # ─── Item 33: Golden Hook ───
  golden_hook:
    enabled: true
    # Bonus experience dropped by creatures (percentage)
    bonus-experience: 0.8

  # ─── Item 34: Onion Ring ───
  onion_ring:
    enabled: true
    # Mining speed amplifier (0 = Haste I)
    speed-amplifier: 2
    # Duration of speed boost (seconds)
    duration-seconds: 15
  
  # ─── Item 35: Pickaxe Heater ───
  pickaxe_heater:
    enabled: true
  
  # ─── Item 36: Aqua-Dashers ───
  aqua_dashers:
    enabled: true
  
  # ─── Item 37: Bunny Hoppers ───
  bunny_hoppers:
    enabled: true
    # Jump height amplifier (0 = Jump Boost I)
    jump-height-amplifier: 1
    # Fall damage immunity
    fall-damage-immunity: true
  
  # ─── Item 38: Kitty Slippers ───
  kitty_slippers:
    enabled: true

  # ─── Item 39: Running Shoes ───
  running_shoes:
    enabled: true
    # Speed amplifier (percentage)
    speed-amplifier: 0.4
    # Step height amplifier (blocks)
    step-height-amplifier: 1

  # ─── Item 40: Snowshoes ───
  snowshoes:
    enabled: true
    # Powder snow immunity
    powder-snow-immunity: true
    # Ice slipperiness reduction (0.0 = no effect, 1.0 = fully slippery)
    ice-slipperiness-reduction: 0.5

  # ─── Item 41: Steadfast Spikes ───
  steadfast_spikes:
    enabled: true
    # Knockback resistance (percentage)
    knockback-amplifier: 1.0
  
  # ─── Item 42: Flippers ───
  flippers:
    enabled: true
    # Dolphins grace amplifier
    dolphins-grace-amplifier: 0

  # ─── Item 43: Rooted Boots ───
  rooted_boots:
    enabled: true
    # hunger replenish speed
    hunger-replenish-speed: 0.5
    # hunger replenish interval (ticks)
    hunger-replenish-interval: 40

  # ─── Item 45: Withered Bracelet ───
  withered_bracelet:
    enabled: true
    # Wither duration on attacker (seconds)
    wither-duration-seconds: 8
    # Wither amplifier on attacker (0 = Wither I)
    wither-amplifier: 1
    # Chance to apply wither (0.0 - 1.0)
    wither-chance: 0.4
    
  # ─── Item 46: Warp Drive ───
  warp_drive:
    enabled: true # disabled because it is not working correctly
    # Hunger cost per use
    hunger-cost: 2
    
  # ─── Item 47: Charm of Shrinking ───
  charm_of_shrinking:
    enabled: true
    
  # ─── Item 48: Strider Shoes ───
  strider_shoes:
    enabled: true # disabled because it is not working correctly
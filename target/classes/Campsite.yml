campsite:
  # How many attempts to generate a campsite per chunk (0 = disabled)
  count: 10

  # Y-range for campsite generation
  min-y: -60
  max-y: 40

  # Probability (0.0 - 1.0) that a chest is a mimic instead
  mimic-chance: 0.3

  # Probability (0.0 - 1.0) that a chest is a trapped chest with TNT below
  trapped-chest-chance: 0.125

  # Probability that a chest generates its internal loot table
  chest-loot-chance: 1.0

  # Probability that a barrel generates its internal loot table
  barrel-loot-chance: 0.5

  # Whether to place lit campfires / light sources (10% campfire, 30% lantern)
  allow-light-sources: true

  # If true, only place a single chest/mimic (minimalist mode)
  minimalist-campsites: false

  # Minimum ceiling height required above the campsite floor
  max-ceiling-height: 6

  # Worlds where campsites are allowed to spawn.
  # New worlds will be added to this list automatically when discovered.
  worlds:
    world: true